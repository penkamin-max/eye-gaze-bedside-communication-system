<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Bedside Request Dashboard v5</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 16px;
      font-family: Arial, Helvetica, sans-serif;
      background: #0f172a;
      color: white;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
    }

    h1 {
      margin: 8px 0;
      text-align: center;
      font-size: 26px;
    }

    .subtitle {
      margin-bottom: 10px;
      text-align: center;
      color: #94a3b8;
    }

    .connection-status {
      margin-bottom: 14px;
      text-align: center;
      color: #facc15;
      font-weight: bold;
    }

    .card {
      margin-bottom: 16px;
      padding: 20px;
      background: #1e293b;
      border: 2px solid #334155;
      border-radius: 20px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.35);
    }

    .current-card-high {
      border-color: #ef4444;
      box-shadow:
        0 0 0 2px rgba(239, 68, 68, 0.15),
        0 10px 28px rgba(239, 68, 68, 0.18);
    }

    .current-card-low {
      border-color: #38bdf8;
    }

    .type {
      margin-bottom: 16px;
      font-size: 30px;
      font-weight: bold;
      line-height: 1.2;
    }

    .row {
      margin: 11px 0;
      font-size: 16px;
    }

    .label {
      color: #94a3b8;
    }

    .priority-high {
      color: #ff4d4d;
      font-weight: 900;
    }

    .priority-low {
      color: #38bdf8;
      font-weight: 900;
    }

    .status {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      font-weight: bold;
    }

    .status-pending {
      background: #78350f;
      color: #fde68a;
    }

    .status-acknowledged {
      background: #075985;
      color: #bae6fd;
    }

    .status-completed {
      background: #14532d;
      color: #bbf7d0;
    }

    button {
      width: 100%;
      margin-top: 12px;
      padding: 14px;
      border: none;
      border-radius: 13px;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }

    .enable-sound {
      margin-top: 0;
      margin-bottom: 16px;
      background: #facc15;
      color: #422006;
    }

    .ack {
      background: #38bdf8;
      color: #082f49;
    }

    .done {
      background: #22c55e;
      color: #052e16;
    }

    .clear {
      background: #ef4444;
      color: white;
    }

    .refresh {
      background: #64748b;
      color: white;
    }

    .empty {
      padding: 30px 0;
      text-align: center;
      color: #94a3b8;
      font-size: 17px;
    }

    .section-title {
      margin: 0 0 14px;
      font-size: 20px;
    }

    .history-item {
      margin-bottom: 13px;
      padding: 14px;
      background: #162033;
      border: 1px solid #334155;
      border-radius: 14px;
      color: #cbd5e1;
      font-size: 14px;
    }

    .history-item:last-child {
      margin-bottom: 0;
    }

    .history-title {
      margin-bottom: 8px;
      color: white;
      font-size: 16px;
      font-weight: bold;
    }

    .history-meta {
      margin-top: 7px;
      color: #94a3b8;
      font-size: 13px;
    }

    .history-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .history-actions button {
      margin-top: 0;
      padding: 10px 6px;
      font-size: 14px;
    }

    .history-current-label {
      display: inline-block;
      margin-left: 6px;
      padding: 3px 7px;
      background: #7c3aed;
      border-radius: 999px;
      color: white;
      font-size: 11px;
      font-weight: bold;
    }

    .footer {
      margin-top: 18px;
      text-align: center;
      color: #64748b;
      font-size: 13px;
    }

    .loading {
      opacity: 0.65;
      pointer-events: none;
    }

    @media (max-width: 420px) {
      body {
        padding: 10px;
      }

      .card {
        padding: 16px;
      }

      .type {
        font-size: 26px;
      }

      h1 {
        font-size: 23px;
      }
    }
  </style>
</head>

<body>
  <audio
    id="alertSound"
    preload="auto"
    src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"
  ></audio>

  <div class="container">
    <h1>Bedside Request Dashboard</h1>

    <div class="subtitle">
      Realtime mobile caregiver interface
    </div>

    <div
      id="connectionStatus"
      class="connection-status"
    >
      ● Connecting...
    </div>

    <button
      id="enableSoundButton"
      class="enable-sound"
      type="button"
      onclick="enableAlertSound()"
    >
      Enable Alert Sound
    </button>

    <div
      class="card"
      id="requestCard"
    >
      <div class="empty">
        Waiting for patient request...
      </div>
    </div>

    <div class="card">
      <h2 class="section-title">
        Recent History
      </h2>

      <div id="historyList">
        <div class="empty">
          Loading history...
        </div>
      </div>

      <button
        class="refresh"
        type="button"
        onclick="loadDashboardData()"
      >
        Refresh Dashboard
      </button>
    </div>

    <div class="footer">
      Firebase Realtime Database
    </div>
  </div>

  <script>
    const DATABASE_URL =
      "https://eye-gaze-nurse-call-default-rtdb.asia-southeast1.firebasedatabase.app";

    const requestCard =
      document.getElementById("requestCard");

    const historyList =
      document.getElementById("historyList");

    const alertSound =
      document.getElementById("alertSound");

    const enableSoundButton =
      document.getElementById("enableSoundButton");

    const connectionStatus =
      document.getElementById("connectionStatus");

    let currentRequest = null;
    let lastRequestId = null;
    let initialRequestLoaded = false;
    let alertEnabled = false;
    let requestInProgress = false;


    function escapeHtml(value) {
      const text = String(value ?? "");

      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }


    function getStatusClass(status) {
      if (status === "Acknowledged") {
        return "status-acknowledged";
      }

      if (status === "Completed") {
        return "status-completed";
      }

      return "status-pending";
    }


    function setConnectionState(isConnected) {
      if (isConnected) {
        connectionStatus.textContent = "● Connected";
        connectionStatus.style.color = "#22c55e";
      } else {
        connectionStatus.textContent = "● Disconnected";
        connectionStatus.style.color = "#ef4444";
      }
    }


    function setLoading(isLoading) {
      requestInProgress = isLoading;

      if (isLoading) {
        requestCard.classList.add("loading");
        historyList.classList.add("loading");
      } else {
        requestCard.classList.remove("loading");
        historyList.classList.remove("loading");
      }
    }


    async function enableAlertSound() {
      try {
        alertSound.currentTime = 0;
        await alertSound.play();

        alertSound.pause();
        alertSound.currentTime = 0;

        alertEnabled = true;
        enableSoundButton.textContent = "Alert Sound Enabled";
        enableSoundButton.disabled = true;

      } catch (error) {
        console.error("[ALERT SOUND ERROR]", error);

        alert(
          "The browser blocked alert sound. Increase the phone volume and tap the button again."
        );
      }
    }


    function notifyNewRequest(data) {
      if (!data) {
        return;
      }

      if (alertEnabled) {
        alertSound.currentTime = 0;

        alertSound.play().catch(error => {
          console.error("[SOUND PLAYBACK ERROR]", error);
        });
      }

      if (
        data.priority === "High" &&
        "vibrate" in navigator
      ) {
        navigator.vibrate([300, 150, 300]);
      }
    }


    async function loadDashboardData() {
      try {
        const [
          currentResponse,
          historyResponse
        ] = await Promise.all([
          fetch(
            `${DATABASE_URL}/current_request.json`,
            { cache: "no-store" }
          ),

          fetch(
            `${DATABASE_URL}/request_history.json`,
            { cache: "no-store" }
          )
        ]);

        if (!currentResponse.ok) {
          throw new Error(
            `Current request error: ${currentResponse.status}`
          );
        }

        if (!historyResponse.ok) {
          throw new Error(
            `History error: ${historyResponse.status}`
          );
        }

        const newCurrentRequest =
          await currentResponse.json();

        const historyData =
          await historyResponse.json();

        if (!initialRequestLoaded) {
          lastRequestId =
            newCurrentRequest?.request_id ?? null;

          initialRequestLoaded = true;

        } else if (
          newCurrentRequest &&
          String(newCurrentRequest.request_id) !==
          String(lastRequestId)
        ) {
          notifyNewRequest(newCurrentRequest);

          lastRequestId =
            newCurrentRequest.request_id;
        }

        currentRequest = newCurrentRequest;

        renderCurrentRequest(currentRequest);
        renderHistory(historyData);
        setConnectionState(true);

      } catch (error) {
        console.error("[FIREBASE LOAD ERROR]", error);

        requestCard.innerHTML = `
          <div class="empty">
            Cannot connect to Firebase
          </div>
        `;

        setConnectionState(false);
      }
    }


    function renderCurrentRequest(data) {
      requestCard.classList.remove(
        "current-card-high",
        "current-card-low"
      );

      if (!data) {
        currentRequest = null;

        requestCard.innerHTML = `
          <div class="empty">
            Waiting for patient request...
          </div>
        `;

        return;
      }

      const priorityClass =
        data.priority === "High"
          ? "priority-high"
          : "priority-low";

      const cardClass =
        data.priority === "High"
          ? "current-card-high"
          : "current-card-low";

      const statusClass =
        getStatusClass(data.status);

      requestCard.classList.add(cardClass);

      const acknowledgeDisabled =
        data.status === "Acknowledged" ||
        data.status === "Completed";

      const completeDisabled =
        data.status === "Completed";

      requestCard.innerHTML = `
        <div class="type">
          ${escapeHtml(data.type || "Unknown Request")}
        </div>

        <div class="row">
          <span class="label">Request ID:</span>
          #${escapeHtml(data.request_id ?? "")}
        </div>

        <div class="row">
          <span class="label">Priority:</span>

          <span class="${priorityClass}">
            ${escapeHtml(data.priority || "")}
          </span>
        </div>

        <div class="row">
          <span class="label">Status:</span>

          <span class="status ${statusClass}">
            ${escapeHtml(data.status || "Pending")}
          </span>
        </div>

        <div class="row">
          <span class="label">Time:</span>
          ${escapeHtml(data.timestamp || "")}
        </div>

        <button
          class="ack"
          type="button"
          onclick="updateCurrentStatus('Acknowledged')"
          ${acknowledgeDisabled ? "disabled" : ""}
        >
          Acknowledge
        </button>

        <button
          class="done"
          type="button"
          onclick="updateCurrentStatus('Completed')"
          ${completeDisabled ? "disabled" : ""}
        >
          Complete
        </button>

        <button
          class="clear"
          type="button"
          onclick="clearCurrentRequest()"
        >
          Clear Current Request
        </button>
      `;
    }


    function renderHistory(data) {
      if (!data) {
        historyList.innerHTML = `
          <div class="empty">
            No history available
          </div>
        `;

        return;
      }

      const entries = Object.entries(data)
        .filter(([key, item]) => item != null)
        .sort((entryA, entryB) => {
          const itemA = entryA[1];
          const itemB = entryB[1];

          return (
            Number(itemB.request_id || 0) -
            Number(itemA.request_id || 0)
          );
        })
        .slice(0, 10);

      if (entries.length === 0) {
        historyList.innerHTML = `
          <div class="empty">
            No history available
          </div>
        `;

        return;
      }

      historyList.innerHTML =
        entries.map(([firebaseKey, item]) => {
          const priorityClass =
            item.priority === "High"
              ? "priority-high"
              : "priority-low";

          const statusClass =
            getStatusClass(item.status);

          const isCurrent =
            currentRequest &&
            String(currentRequest.request_id) ===
            String(item.request_id);

          const acknowledgeDisabled =
            item.status === "Acknowledged" ||
            item.status === "Completed";

          const completeDisabled =
            item.status === "Completed";

          return `
            <div class="history-item">
              <div class="history-title">
                #${escapeHtml(item.request_id ?? "")}
                —
                ${escapeHtml(item.type || "Unknown Request")}

                ${
                  isCurrent
                    ? `<span class="history-current-label">CURRENT</span>`
                    : ""
                }
              </div>

              <div>
                <span class="${priorityClass}">
                  ${escapeHtml(item.priority || "")}
                </span>

                ·

                <span class="status ${statusClass}">
                  ${escapeHtml(item.status || "Pending")}
                </span>
              </div>

              <div class="history-meta">
                ${escapeHtml(item.timestamp || "")}
              </div>

              <div class="history-actions">
                <button
                  class="ack history-status-button"
                  type="button"
                  data-firebase-key="${escapeHtml(firebaseKey)}"
                  data-request-id="${escapeHtml(item.request_id ?? "")}"
                  data-status="Acknowledged"
                >
                  Acknowledge
                </button>

                <button
                  class="done history-status-button"
                  type="button"
                  data-firebase-key="${escapeHtml(firebaseKey)}"
                  data-request-id="${escapeHtml(item.request_id ?? "")}"
                  data-status="Completed"
                >
                  Complete
                </button>
              </div>
            </div>
          `;
        }).join("");
    }


    historyList.addEventListener(
      "click",
      async event => {
        const button =
          event.target.closest(".history-status-button");

        if (!button) {
          return;
        }

        const firebaseKey =
          button.dataset.firebaseKey;

        const requestId =
          button.dataset.requestId;

        const newStatus =
          button.dataset.status;

        await updateHistoryStatus(
          firebaseKey,
          requestId,
          newStatus
        );
      }
    );


    async function updateCurrentStatus(newStatus) {
      if (
        !currentRequest ||
        currentRequest.request_id == null
      ) {
        alert("There is no active request.");
        return;
      }

      const historyKey =
        `req_${currentRequest.request_id}`;

      await updateHistoryStatus(
        historyKey,
        currentRequest.request_id,
        newStatus
      );
    }


    async function updateHistoryStatus(
      firebaseKey,
      requestId,
      newStatus
    ) {
      if (requestInProgress) {
        return;
      }

      setLoading(true);

      try {
        const requestsToSend = [
          fetch(
            `${DATABASE_URL}/request_history/${encodeURIComponent(firebaseKey)}/status.json`,
            {
              method: "PUT",

              headers: {
                "Content-Type": "application/json"
              },

              body: JSON.stringify(newStatus)
            }
          )
        ];

        const isCurrentRequest =
          currentRequest &&
          String(currentRequest.request_id) ===
          String(requestId);

        if (isCurrentRequest) {
          requestsToSend.push(
            fetch(
              `${DATABASE_URL}/current_request/status.json`,
              {
                method: "PUT",

                headers: {
                  "Content-Type": "application/json"
                },

                body: JSON.stringify(newStatus)
              }
            )
          );
        }

        const responses =
          await Promise.all(requestsToSend);

        const hasError =
          responses.some(response => !response.ok);

        if (hasError) {
          throw new Error(
            "Firebase status update failed"
          );
        }

        if (isCurrentRequest) {
          currentRequest.status = newStatus;
        }

        await loadDashboardData();

        console.log(
          `[STATUS UPDATED] Request ${requestId}: ${newStatus}`
        );

      } catch (error) {
        console.error("[STATUS UPDATE ERROR]", error);

        alert(
          "Cannot update request status. Please check the Internet connection."
        );

      } finally {
        setLoading(false);
      }
    }


    async function clearCurrentRequest() {
      if (requestInProgress || !currentRequest) {
        return;
      }

      setLoading(true);

      try {
        const response = await fetch(
          `${DATABASE_URL}/current_request.json`,
          {
            method: "DELETE"
          }
        );

        if (!response.ok) {
          throw new Error(
            `Clear request error: ${response.status}`
          );
        }

        currentRequest = null;
        lastRequestId = null;

        renderCurrentRequest(null);

        await loadDashboardData();

        console.log(
          "[FIREBASE] Current request cleared"
        );

      } catch (error) {
        console.error("[CLEAR REQUEST ERROR]", error);

        alert(
          "Cannot clear the current request. Please check the Internet connection."
        );

      } finally {
        setLoading(false);
      }
    }


    loadDashboardData();

    setInterval(
      loadDashboardData,
      1000
    );
  </script>
</body>
</html>
